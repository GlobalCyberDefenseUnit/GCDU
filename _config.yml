# Site settings
remote_theme: raviriley/agency-jekyll-theme

url    : "https://gcdu.github.io" # o domínio base do seu site
baseurl: ""                       # vazio porque o repositório é gcdu.github.io

title       : Global Cyber Defense Unit
email       : gcdc@proton.me  # substitua pelo email seguro que usa para contactos
description : "Independent pro bono cyber defence – protecting people and critical infrastructure since 2015."
author      : GCDU

locale: "en-US" # Define o idioma principal do site (usado no sitetext.yml)

analytics:
  google: # deixe vazio se não tiver Google Analytics

collections:
  portfolio:

markdown: kramdown

# Configuração para o formulário de contacto (Formspree)
# Depois de criar a conta no Formspree, descomente e insira o seu ID:
# formspree_form_path: "f/o_seu_id_aqui"

plugins:
  - jekyll-remote-theme
