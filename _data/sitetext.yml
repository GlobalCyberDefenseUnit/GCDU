header:
  title: "Global Cyber Defense Unit"
  text: "Independent, pro bono cyber defence. No external funding. Our only currency is the truth."
  button: "Our Mission"
  buttonlink: "#services"

services:
  title: "What We Do"
  section: services
  list:
    - title: "Threat Intelligence"
      desc: "We collect, analyse and report on APTs, cyberterrorism and espionage. Averaging 300 reports per month since 2025."
      icon: fas fa-brain
    - title: "Critical Infrastructure Protection"
      desc: "We defend energy, water, health, communications, defence and transport through continuous monitoring and vulnerability audits."
      icon: fas fa-shield-alt
    - title: "Incident Response & Sensitive Crimes"
      desc: "We actively pursue child exploitation networks and terrorists. We deliver actionable intelligence to authorities, legally and free of charge."
      icon: fas fa-child

about:
  title: "Who We Are"
  section: about
  timeline:
    - title: "Foundation"
      desc: "GCDU was born in 2015 in the aftermath of the persecution of cyber‑vigilantes. The mission: fill the defence void left by the state."
      year: "2015"
      icon: fas fa-flag
    - title: "Radical Independence"
      desc: "Zero external funding. Everything is paid out of members' own pockets, guaranteeing complete freedom and absolute integrity."
      year: "Self‑funded"
      icon: fas fa-hand-holding-heart
    - title: "Open War"
      desc: "We face nation‑state APTs with no protection, driven solely by the will to defend the normal functioning of things."
      year: "Commitment"
      icon: fas fa-fist-raised
    - title: "Real Impact"
      desc: "Over 30 extremist groups neutralised, thousands of incidents handled, lives saved. Discreet decorations in the US and UK."
      year: "Results"
      icon: fas fa-medal

